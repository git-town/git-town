# rumdl configuration file

[global]
# Additional rules to enable on top of defaults (additive, does not replace)
extend-enable = [
  "MD060", # format tables
  "MD063", # heading capitalization
  "MD070", # nested code fence collision
]

# Additional rules to disable on top of the disable list (additive)
extend-disable = [
  "MD001", # heading levels should increment by one level at a time
  "MD033", # allow inline HTML
]

exclude = [".git", ".github", ".tools", "vendor", "CHANGELOG.md"]

# Respect .gitignore files when scanning directories (default: true)
respect-gitignore = true

# Markdown flavor/dialect: standard (default), gfm, commonmark, mkdocs, mdx, quarto
flavor = "gfm"

# text-wrap
[MD013]
line-length = 80
reflow = true # Enable automatic text reflow/wrapping
reflow-mode = "semantic-line-breaks" # Reflow mode: "default", "normalize", "sentence-per-line", or "semantic-line-breaks" (default: "default")
length-mode = "visual" # How to count line length: "visual", "chars", or "bytes" (default: "visual")
code-blocks = false # Exclude code blocks from line length check
tables = false # Exclude tables from line length check
# headings = true  # Include headings in line length check

# Proper names that should be capitalized correctly
[MD044]
names = [
  # keep-sorted start
  "Cucumber",
  "E2E",
  "Git Town",
  "Git",
  "Q & A",
  "[git town",
  "git-branches.toml",
  "git append",
  "git diff-parent",
  "git hack",
  "git ship",
  "git sync",
  "git town append",
  "git town branch",
  "git town completions",
  "git town compress",
  "git town config",
  "git town continue",
  "git town contribute",
  "git town delete",
  "git town detach",
  "git town diff-parent",
  "git town down",
  "git town feature",
  "git town hack",
  "git town help",
  "git town init",
  "git town merge",
  "git town observe",
  "git town offline",
  "git town park",
  "git town prepend",
  "git town propose",
  "git town prototype",
  "git town rename",
  "git town repo",
  "git town runlog",
  "git town set-parent",
  "git town ship",
  "git town skip",
  "git town status",
  "git town swap",
  "git town switch",
  "git town sync",
  "git town undo",
  "git town up",
  "git-town",
  # keep-sorted end
]
code-blocks = false
html-elements = false

# format tables
[MD060]
enabled = true
style = "aligned"

[MD063]
style = "sentence-case"
